[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  SECRETS_SCAN_ENABLED = "false"

# Handle Next.js routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# API routes
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
  force = true

# Static assets
[[redirects]]
  from = "/_next/static/*"
  to = "/_next/static/:splat"
  status = 200

# Images
[[redirects]]
  from = "/_next/image/*"
  to = "/_next/image/:splat"
  status = 200

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.{jpg,jpeg,png,gif,svg,webp,ico}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Function configuration
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]

[functions."api/*"]
  max_duration = 30
  memory = 1024